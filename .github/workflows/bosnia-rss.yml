name: Bósnia RSS

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install feedparser requests

      - name: Postar notícias
        env:
          CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
        run: |
          python - << 'EOF'
import feedparser, requests, os, time
RSS_URL = "https://www.google.com/alerts/feeds/15026164443771540408/3341581347118433992"
r = requests.post("https://api.x.com/2/oauth2/token", data={
    "grant_type": "client_credentials",
    "client_id": os.environ["CLIENT_ID"],
    "client_secret": os.environ["CLIENT_SECRET"]
})
bearer = r.json().get("access_token")
feed = feedparser.parse(RSS_URL)
for entry in feed.entries[:3]:
    text = f"📰 {entry.title}\n\n{entry.get('summary','')[:140]}...\n\n🔗 {entry.link}\n\n#Bósnia"
    if len(text) > 280:
        text = text[:277] + "..."
    requests.post("https://api.x.com/2/tweets", headers={"Authorization": f"Bearer {bearer}"}, json={"text": text})
    time.sleep(10)
print("✅ Feito!")
EOF
